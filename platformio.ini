; LumiGlyph / LumiGraph — 5-bar linkage LED drawing machine
;
; env:m5stick-c  … 元のM5StickC Plus版 (LumiGlyph)
; env:Drawing    … DigiKey挑戦版: AtomS3R-CAM 描画機 (ROLE_DRAWING)
; env:Display    … DigiKey挑戦版: AtomS3R  表示機 (ROLE_DISPLAY)

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
lib_deps =
    m5stack/M5StickCPlus @ ^0.1.0
    madhephaestus/ESP32Servo @ ^0.13.0
    fastled/FastLED @ ^3.7.0

[common_lg]
platform  = espressif32@6.7.0
framework = arduino
board     = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

[env:Drawing]
extends = common_lg
build_flags =
    ${common_lg.build_flags}
    -DROLE_DRAWING
lib_deps =
    hpsaturn/EspNowCam @ ^0.2.1
    fastled/FastLED @ ^3.7.0

[env:Display]
extends = common_lg
build_flags =
    ${common_lg.build_flags}
    -DROLE_DISPLAY
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    hpsaturn/EspNowCam @ ^0.2.1
